<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>FICHE RAPACES</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- POUR ANDROID -->
  <link rel="manifest" href="manifest.json">

  <!-- POUR IPHONE (TRÈS IMPORTANT) -->
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    body {
      background: #000;
      color: #ffd700;
      font-family: Arial;
      padding: 20px;
    }

    h1 {
      font-size: 40px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      font-size: 16px;
      border-radius: 8px;
    }

    button {
      background: gold;
      border: none;
      font-weight: bold;
    }

    .card {
      border: 1px solid gold;
      padding: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>🦅 FICHE RAPACES</h1>

<input id="nom" placeholder="Nom de l’oiseau">
<input id="poids" placeholder="Poids">
<input id="date" type="date">

<button onclick="ajouter()">Ajouter</button>

<div id="liste"></div>

<script>
let data = JSON.parse(localStorage.getItem("rapaces")) || [];

function afficher() {
  let html = "";

  data.forEach((o, i) => {
    html += `
      <div class="card">
        <b>${o.nom}</b><br>
        Poids: ${o.poids}<br>
        Date: ${o.date}
      </div>
    `;
  });

  document.getElementById("liste").innerHTML = html;
}

function ajouter() {
  let oiseau = {
    nom: document.getElementById("nom").value,
    poids: document.getElementById("poids").value,
    date: document.getElementById("date").value
  };

  data.push(oiseau);
  localStorage.setItem("rapaces", JSON.stringify(data));

  afficher();
}

afficher();
</script>

</body>
</html>
