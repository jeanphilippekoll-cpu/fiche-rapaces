<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>FICHE RAPACES</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f7f4ec;
      margin: 0;
      padding: 10px;
    }

    h1 {
      color: #6b4f12;
    }

    .menu {
      display: grid;
      grid-template-columns: repeat(4,1fr);
      gap: 10px;
      margin-bottom: 10px;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: bold;
    }

    #btnMenuAccueil { background:#2d6aa1; }
    #btnMenuOiseaux { background:#b88a1b; }
    #btnMenuEncodage { background:#2f7d32; }
    #btnMenuDocuments { background:#8a5a2b; }

    .bloc {
      background: white;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
    }

    .hidden { display:none; }

    .bird {
      padding:10px;
      border:1px solid #ccc;
      margin-top:5px;
      border-radius:8px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<h1>🦅 FICHE RAPACES</h1>

<div class="menu">
  <button id="btnMenuAccueil" onclick="show('accueil')">Accueil</button>
  <button id="btnMenuOiseaux" onclick="show('oiseaux')">Oiseaux</button>
  <button id="btnMenuEncodage" onclick="show('encodage')">Encodage</button>
  <button id="btnMenuDocuments" onclick="show('documents')">Documents</button>
</div>

<!-- ACCUEIL -->
<div id="accueil" class="bloc">
  <h2>Accueil</h2>
  <p>Bienvenue dans ton application.</p>
</div>

<!-- OISEAUX -->
<div id="oiseaux" class="bloc hidden">
  <h2>Oiseaux</h2>

  <input id="nom" placeholder="Nom">
  <input id="espece" placeholder="Espèce">

  <button onclick="ajouter()">Ajouter</button>

  <div id="liste"></div>
</div>

<!-- ENCODAGE -->
<div id="encodage" class="bloc hidden">
  <h2>Encodage</h2>
  <p>Fonction en cours</p>
</div>

<!-- DOCUMENTS -->
<div id="documents" class="bloc hidden">
  <h2>Documents</h2>
  <p>Fonction en cours</p>
</div>

<script>
let oiseaux = []

function show(section){
  document.getElementById("accueil").classList.add("hidden")
  document.getElementById("oiseaux").classList.add("hidden")
  document.getElementById("encodage").classList.add("hidden")
  document.getElementById("documents").classList.add("hidden")

  document.getElementById(section).classList.remove("hidden")
}

function ajouter(){
  let nom = document.getElementById("nom").value
  let espece = document.getElementById("espece").value

  oiseaux.push({nom, espece})
  afficher()
}

function afficher(){
  let div = document.getElementById("liste")

  div.innerHTML = oiseaux.map(o => `
    <div class="bird">
      <b>${o.nom}</b><br>
      ${o.espece}
    </div>
  `).join("")
}
</script>

</body>
</html>
