<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>FICHE RAPACES</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; background:#f5f2e8; padding:20px; }
input, select, button { width:100%; padding:10px; margin:5px 0; }
button { background:#b88a1b; color:white; border:none; }
.card { background:white; padding:10px; margin-top:10px; border-radius:10px; }
.enc { background:#eee; padding:8px; margin-top:5px; border-radius:6px; }
img { max-width:100%; border-radius:10px; margin-top:10px; }
</style>
</head>

<body>

<h1>🦅 FICHE RAPACES</h1>
<div id="status">Connexion...</div>

<h2>Oiseau</h2>
<input id="nom" placeholder="Nom">
<input id="espece" placeholder="Espèce">

📸 Photo :
<input type="file" id="photo">

📄 Documents :
<input type="file" id="docs" multiple>

<button onclick="ajouterOiseau()">Ajouter</button>

<h2>Liste</h2>
<div id="liste"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const config = {
  apiKey: "AIzaSyD8VfPlBsxN0F8PexqFfOaU4_slFQU3qsA",
  authDomain: "fiche-rapaces.firebaseapp.com",
  projectId: "fiche-rapaces",
  appId: "1:881543403206:web:17915a78ddbbde9a1929c7"
};

const app = initializeApp(config);
const db = getFirestore(app);
const storage = getStorage(app);

const refDB = doc(db, "rapaces", "data");

let oiseaux = [];

function setStatus(t){
  document.getElementById("status").innerText = t;
}

async function charger(){
  setStatus("Connexion...");
  const snap = await getDoc(refDB);

  if(snap.exists()){
    oiseaux = snap.data().oiseaux || [];
  }

  afficher();
  setStatus("Synchronisé ✅");
}

async function sauver(){
  await setDoc(refDB, { oiseaux });
}

window.ajouterOiseau = async function(){
  try{
    setStatus("Upload...");

    const nom = document.getElementById("nom").value;
    const espece = document.getElementById("espece").value;

    const photoFile = document.getElementById("photo").files[0];
    const docsFiles = document.getElementById("docs").files;

    let photoURL = "";
    let docsURL = [];

    // 📸 upload photo
    if(photoFile){
      const refPhoto = sRef(storage, "photos/" + Date.now());
      await uploadBytes(refPhoto, photoFile);
      photoURL = await getDownloadURL(refPhoto);
    }

    // 📄 upload docs
    for(let file of docsFiles){
      const refDoc = sRef(storage, "docs/" + Date.now() + "_" + file.name);
      await uploadBytes(refDoc, file);
      const url = await getDownloadURL(refDoc);
      docsURL.push(url);
    }

    oiseaux.push({
      nom,
      espece,
      photo: photoURL,
      documents: docsURL
    });

    await sauver();
    afficher();

    setStatus("Synchronisé ✅");

  }catch(e){
    console.error(e);
    setStatus("Erreur ❌");
    alert("Erreur upload : " + e.message);
  }
}

function afficher(){
  const div = document.getElementById("liste");
  div.innerHTML = "";

  oiseaux.forEach(o=>{
    div.innerHTML += `
      <div class="card">
        <strong>${o.nom}</strong> (${o.espece})

        ${o.photo ? `<img src="${o.photo}">` : ""}

        ${
          o.documents
            ? o.documents.map(d=>`<a href="${d}" target="_blank">📄 Document</a><br>`).join("")
            : ""
        }
      </div>
    `;
  });
}

charger();
</script>

</body>
</html>
