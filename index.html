<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>FICHE RAPACES V2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f7f4ec 0%, #efe6d2 100%);
      margin: 0;
      padding: 10px;
      color: #2f2a20;
    }

    h1, h2, h3 {
      color: #6b4f12;
      margin-top: 0;
    }

    .status {
      background: #eef6ff;
      border: 1px solid #b9d6f2;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      font-weight: bold;
      color: #1f4f7a;
    }

    .menu {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 10px;
    }

    .menu button {
      padding: 12px;
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
    }

    #btnMenuAccueil { background: #2d6aa1; }
    #btnMenuOiseaux { background: #b88a1b; }
    #btnMenuEncodage { background: #2f7d32; }
    #btnMenuDocuments { background: #8a5a2b; }

    .bloc {
      background: white;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      box-sizing: border-box;
      border: 1px solid #cdbb8b;
      border-radius: 8px;
      font-size: 15px;
    }

    textarea {
      min-height: 80px;
    }

    .btn {
      background: #b88a1b;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 5px;
    }

    .btn-edit {
      background: #2d6aa1;
    }

    .btn-danger {
      background: #b13a2f;
    }

    .btn-secondaire {
      background: #7d7a72;
    }

    .hidden {
      display: none;
    }

    .bird {
      padding: 10px;
      border: 1px solid #d9c38b;
      border-radius: 10px;
      margin-top: 6px;
      background: #fffdfa;
      cursor: pointer;
    }

    .bird:hover {
      background: #f4e7c7;
    }

    .fiche {
      margin-top: 10px;
      padding: 12px;
      border: 1px solid #d9c38b;
      border-radius: 10px;
      background: #fffdfa;
    }

    .photo {
      max-width: 220px;
      max-height: 220px;
      border-radius: 10px;
      margin-top: 10px;
      display: block;
      object-fit: cover;
    }

    .enc {
      background: #eef7ef;
      border-left: 5px solid #2f7d32;
      border-radius: 8px;
      padding: 10px;
      margin-top: 8px;
    }

    .doc {
      background: #f6efe7;
      border-left: 5px solid #8a5a2b;
      border-radius: 8px;
      padding: 10px;
      margin-top: 8px;
    }

    .doc a {
      color: #6b4f12;
      font-weight: bold;
      text-decoration: none;
    }

    .doc a:hover {
      text-decoration: underline;
    }

    .chart-box {
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 10px;
      margin-top: 10px;
      height: 260px;
    }

    .gain {
      color: #218838;
      font-weight: bold;
    }

    .perte {
      color: #c0392b;
      font-weight: bold;
    }

    .neutre {
      color: #666;
      font-weight: bold;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    @media (max-width: 900px) {
      .menu,
      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <h1>🦅 FICHE RAPACES V2</h1>
  <div id="status" class="status">Connexion...</div>

  <div class="menu">
    <button id="btnMenuAccueil" onclick="showSection('accueil')">Accueil</button>
    <button id="btnMenuOiseaux" onclick="showSection('oiseaux')">Oiseaux</button>
    <button id="btnMenuEncodage" onclick="showSection('encodage')">Encodage</button>
    <button id="btnMenuDocuments" onclick="showSection('documents')">Documents</button>
  </div>

  <div id="accueil" class="bloc">
    <h2>Accueil</h2>
    <p>Bienvenue dans ton application.</p>
  </div>

  <div id="oiseaux" class="bloc hidden">
    <h2>Oiseaux</h2>

    <input id="nom" placeholder="Nom de l’oiseau">
    <input id="espece" placeholder="Espèce">

    <div>Photo :</div>
    <input type="file" id="photoOiseau" accept="image/*">

    <button class="btn" id="btnAjouterOiseau" onclick="ajouterOuModifierOiseau()">Ajouter l’oiseau</button>
    <button class="btn btn-secondaire" onclick="viderFormulaireOiseau()">Vider le formulaire</button>

    <h3>Recherche</h3>
    <input id="recherche" placeholder="Rechercher un oiseau..." oninput="afficherListeOiseaux()">

    <h3>Liste des oiseaux</h3>
    <div id="liste"></div>

    <h3>Fiche de l’oiseau</h3>
    <div id="ficheOiseau">Clique sur un oiseau pour voir sa fiche.</div>
  </div>

  <div id="encodage" class="bloc hidden">
    <h2>Encodage</h2>

    <select id="selectOiseau"></select>
    <input id="dateEncodage" type="date">
    <input id="poids" placeholder="Poids actuel">

    <select id="nourriture">
      <option value="">Choisir la nourriture</option>
      <option value="Poussin">Poussin</option>
      <option value="Caille">Caille</option>
      <option value="Pigeon">Pigeon</option>
      <option value="Rat">Rat</option>
      <option value="Souris">Souris</option>
      <option value="Lapin">Lapin</option>
      <option value="Cou poulet">Cou poulet</option>
      <option value="Poisson">Poisson</option>
      <option value="Coeur">Coeur</option>
    </select>

    <input id="nombre" placeholder="Nombre donné">
    <input id="poidsNourriture" placeholder="Poids nourriture">
    <input id="exercice" placeholder="Exercice">
    <textarea id="notes" placeholder="Notes"></textarea>

    <button class="btn" onclick="ajouterEncodage()">Ajouter l’encodage</button>
    <button class="btn btn-secondaire" onclick="viderFormulaireEncodage()">Vider l’encodage</button>
  </div>

  <div id="documents" class="bloc hidden">
    <h2>Documents</h2>

    <input type="file" id="fichierDocument">
    <button class="btn" onclick="uploadDocument()">Envoyer le document</button>

    <h3>Liste des documents</h3>
    <div id="listeDocuments"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD8VfPlBsxN0F8PexqFfOaU4_slFQU3qsA",
      authDomain: "fiche-rapaces.firebaseapp.com",
      projectId: "fiche-rapaces",
      storageBucket: "fiche-rapaces.firebasestorage.app",
      messagingSenderId: "881543403206",
      appId: "1:881543403206:web:17915a78ddbbde9a1929c7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const refDB = doc(db, "rapaces", "data");

    let oiseaux = [];
    let documents = [];
    let indexOiseauSelectionne = null;
    let indexEditionOiseau = null;
    let graph = null;

    function setStatus(txt) {
      document.getElementById("status").innerText = txt;
    }

    function normalizeText(text) {
      return (text || "")
        .toString()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function trierEncodages(encodages) {
      return [...encodages].sort((a, b) => {
        const da = new Date(a.date || "1900-01-01").getTime();
        const db = new Date(b.date || "1900-01-01").getTime();
        return da - db;
      });
    }

    function calculVariation(encodages, indexCourant) {
      if (indexCourant === 0) return "0 g";
      const precedent = parseFloat(encodages[indexCourant - 1].poids);
      const actuel = parseFloat(encodages[indexCourant].poids);

      if (isNaN(precedent) || isNaN(actuel)) return "0 g";

      const diff = actuel - precedent;
      if (diff > 0) return "+" + diff + " g";
      if (diff < 0) return diff + " g";
      return "0 g";
    }

    function variationClass(txt) {
      if (!txt || txt === "0 g") return "neutre";
      if (txt.startsWith("+")) return "gain";
      if (txt.startsWith("-")) return "perte";
      return "neutre";
    }

    function recalculerVariationsPourOiseau(indexOiseau) {
      if (!oiseaux[indexOiseau] || !Array.isArray(oiseaux[indexOiseau].encodages)) return;
      const tries = trierEncodages(oiseaux[indexOiseau].encodages);
      tries.forEach((e, i) => {
        e.variation = calculVariation(tries, i);
      });
      oiseaux[indexOiseau].encodages = tries;
    }

    window.showSection = function(section) {
      document.getElementById("accueil").classList.add("hidden");
      document.getElementById("oiseaux").classList.add("hidden");
      document.getElementById("encodage").classList.add("hidden");
      document.getElementById("documents").classList.add("hidden");
      document.getElementById(section).classList.remove("hidden");
    };

    function remplirSelectOiseaux() {
      const s = document.getElementById("selectOiseau");

      if (oiseaux.length === 0) {
        s.innerHTML = "<option value=''>Aucun oiseau</option>";
        return;
      }

      s.innerHTML = oiseaux.map((o, index) =>
        `<option value="${index}">${o.nom}</option>`
      ).join("");
    }

    function dessinerCourbe(encodages) {
      const canvas = document.getElementById("courbePoids");
      if (!canvas) return;

      if (graph) {
        graph.destroy();
      }

      const tries = trierEncodages(encodages).filter(e =>
        e.poids !== null &&
        e.poids !== "" &&
        !isNaN(parseFloat(e.poids))
      );

      if (tries.length === 0) return;

      const labels = tries.map(e => e.date || "-");
      const data = tries.map(e => parseFloat(e.poids));

      graph = new Chart(canvas, {
        type: "line",
        data: {
          labels,
          datasets: [{
            label: "Poids",
            data,
            tension: 0.2
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false
        }
      });
    }

    function afficherFiche() {
      const fiche = document.getElementById("ficheOiseau");

      if (indexOiseauSelectionne === null || !oiseaux[indexOiseauSelectionne]) {
        fiche.innerHTML = "Clique sur un oiseau pour voir sa fiche.";
        return;
      }

      const o = oiseaux[indexOiseauSelectionne];
      const encodages = trierEncodages(Array.isArray(o.encodages) ? o.encodages : []);

      fiche.innerHTML = `
        <div class="fiche">
          <div><strong>Nom :</strong> ${o.nom || "-"}</div>
          <div><strong>Espèce :</strong> ${o.espece || "-"}</div>
          ${o.photo ? `<img class="photo" src="${o.photo}" alt="photo">` : ""}

          <div class="actions">
            <button class="btn btn-edit" onclick="modifierOiseau(${indexOiseauSelectionne})">Modifier l’oiseau</button>
            <button class="btn btn-danger" onclick="supprimerOiseau(${indexOiseauSelectionne})">Supprimer l’oiseau</button>
          </div>

          <h3>Courbe de poids</h3>
          ${
            encodages.some(e => e.poids !== null && e.poids !== "" && !isNaN(parseFloat(e.poids)))
              ? `<div class="chart-box"><canvas id="courbePoids"></canvas></div>`
              : `<div class="enc">Ajoute au moins un poids pour voir la courbe.</div>`
          }

          <h3>Encodages</h3>
          ${
            encodages.length === 0
              ? "<div class='enc'>Aucun encodage</div>"
              : encodages.map(e => `
                  <div class="enc">
                    <div><strong>Date :</strong> ${e.date || "-"}</div>
                    <div><strong>Poids :</strong> ${e.poids || "-"}</div>
                    <div><strong>Variation :</strong> <span class="${variationClass(e.variation)}">${e.variation || "0 g"}</span></div>
                    <div><strong>Nourriture :</strong> ${e.nourriture || "-"}</div>
                    <div><strong>Nombre :</strong> ${e.nombre || "-"}</div>
                    <div><strong>Poids nourriture :</strong> ${e.poidsNourriture || "-"}</div>
                    <div><strong>Exercice :</strong> ${e.exercice || "-"}</div>
                    <div><strong>Notes :</strong> ${e.notes || "-"}</div>
                  </div>
                `).join("")
          }
        </div>
      `;

      setTimeout(() => {
        dessinerCourbe(encodages);
      }, 50);
    }

    window.ouvrirOiseau = function(index) {
      indexOiseauSelectionne = index;
      afficherFiche();
    };

    window.afficherListeOiseaux = function() {
      const q = normalizeText(document.getElementById("recherche").value);
      const liste = document.getElementById("liste");

      const filtres = oiseaux
        .map((o, index) => ({ o, index }))
        .filter(({ o }) => {
          const texte = normalizeText((o.nom || "") + " " + (o.espece || ""));
          return texte.includes(q);
        });

      if (filtres.length === 0) {
        liste.innerHTML = "<div class='bird'>Aucun oiseau trouvé.</div>";
        return;
      }

      liste.innerHTML = filtres.map(({ o, index }) => `
        <div class="bird" onclick="ouvrirOiseau(${index})">
          <strong>${o.nom || ""}</strong><br>
          ${o.espece || ""}
        </div>
      `).join("");
    };

    function afficherDocuments() {
      const div = document.getElementById("listeDocuments");

      if (!documents.length) {
        div.innerHTML = "<div class='doc'>Aucun document.</div>";
        return;
      }

      div.innerHTML = documents.map(d => `
        <div class="doc">
          <a href="${d.lien}" target="_blank">${d.nom}</a>
        </div>
      `).join("");
    }

    async function charger() {
      try {
        setStatus("Connexion...");
        const snap = await getDoc(refDB);

        if (snap.exists()) {
          const data = snap.data();
          oiseaux = Array.isArray(data.oiseaux) ? data.oiseaux : [];
          documents = Array.isArray(data.documents) ? data.documents : [];
        } else {
          oiseaux = [];
          documents = [];
        }

        oiseaux = oiseaux.map(o => ({
          nom: o.nom || "",
          espece: o.espece || "",
          photo: o.photo || "",
          encodages: Array.isArray(o.encodages) ? o.encodages : []
        }));

        oiseaux.forEach((_, i) => recalculerVariationsPourOiseau(i));

        afficherListeOiseaux();
        afficherFiche();
        remplirSelectOiseaux();
        afficherDocuments();
        setStatus("Synchronisé ✅");
      } catch (e) {
        console.error(e);
        setStatus("Erreur ❌");
        alert("Erreur Firebase : " + e.message);
      }
    }

    async function sauver() {
      try {
        setStatus("Sauvegarde...");
        await setDoc(refDB, { oiseaux, documents }, { merge: true });
        setStatus("Synchronisé ✅");
      } catch (e) {
        console.error(e);
        setStatus("Erreur ❌");
        alert("Erreur écriture Firebase : " + e.message);
      }
    }

    async function uploadFile(path, file) {
      const storageRef = ref(storage, path);
      await uploadBytes(storageRef, file);
      return await getDownloadURL(storageRef);
    }

    window.ajouterOuModifierOiseau = async function() {
      const nom = document.getElementById("nom").value.trim();
      const espece = document.getElementById("espece").value.trim();
      const photoFile = document.getElementById("photoOiseau").files[0];

      if (!nom) {
        alert("Nom obligatoire");
        return;
      }

      try {
        let photo = "";
        let encodages = [];

        if (indexEditionOiseau !== null) {
          photo = oiseaux[indexEditionOiseau].photo || "";
          encodages = Array.isArray(oiseaux[indexEditionOiseau].encodages) ? oiseaux[indexEditionOiseau].encodages : [];
        }

        if (photoFile) {
          setStatus("Upload photo...");
          photo = await uploadFile("photos/" + Date.now() + "_" + photoFile.name, photoFile);
        }

        const oiseau = {
          nom,
          espece,
          photo,
          encodages
        };

        if (indexEditionOiseau !== null) {
          oiseaux[indexEditionOiseau] = oiseau;
          indexEditionOiseau = null;
          document.getElementById("btnAjouterOiseau").innerText = "Ajouter l’oiseau";
        } else {
          oiseaux.push(oiseau);
        }

        await sauver();
        afficherListeOiseaux();
        remplirSelectOiseaux();

        document.getElementById("nom").value = "";
        document.getElementById("espece").value = "";
        document.getElementById("photoOiseau").value = "";
      } catch (e) {
        console.error(e);
        setStatus("Erreur ❌");
        alert("Erreur ajout oiseau : " + e.message);
      }
    };

    window.modifierOiseau = function(index) {
      const o = oiseaux[index];
      document.getElementById("nom").value = o.nom || "";
      document.getElementById("espece").value = o.espece || "";
      indexEditionOiseau = index;
      document.getElementById("btnAjouterOiseau").innerText = "Enregistrer les modifications";
      showSection("oiseaux");
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    window.supprimerOiseau = async function(index) {
      if (!confirm("Supprimer cet oiseau ?")) return;
      oiseaux.splice(index, 1);
      if (indexOiseauSelectionne === index) indexOiseauSelectionne = null;
      if (indexEditionOiseau === index) indexEditionOiseau = null;
      await sauver();
      afficherListeOiseaux();
      afficherFiche();
      remplirSelectOiseaux();
    };

    window.viderFormulaireOiseau = function() {
      document.getElementById("nom").value = "";
      document.getElementById("espece").value = "";
      document.getElementById("photoOiseau").value = "";
      indexEditionOiseau = null;
      document.getElementById("btnAjouterOiseau").innerText = "Ajouter l’oiseau";
    };

    window.ajouterEncodage = async function() {
      const index = document.getElementById("selectOiseau").value;

      if (index === "") {
        alert("Choisis un oiseau");
        return;
      }

      const enc = {
        date: document.getElementById("dateEncodage").value,
        poids: document.getElementById("poids").value,
        nourriture: document.getElementById("nourriture").value,
        nombre: document.getElementById("nombre").value,
        poidsNourriture: document.getElementById("poidsNourriture").value,
        exercice: document.getElementById("exercice").value,
        notes: document.getElementById("notes").value,
        variation: "0 g"
      };

      if (!Array.isArray(oiseaux[index].encodages)) {
        oiseaux[index].encodages = [];
      }

      oiseaux[index].encodages.push(enc);
      recalculerVariationsPourOiseau(parseInt(index, 10));

      await sauver();

      indexOiseauSelectionne = parseInt(index, 10);
      afficherFiche();

      document.getElementById("dateEncodage").value = "";
      document.getElementById("poids").value = "";
      document.getElementById("nourriture").value = "";
      document.getElementById("nombre").value = "";
      document.getElementById("poidsNourriture").value = "";
      document.getElementById("exercice").value = "";
      document.getElementById("notes").value = "";
    };

    window.viderFormulaireEncodage = function() {
      document.getElementById("dateEncodage").value = "";
      document.getElementById("poids").value = "";
      document.getElementById("nourriture").value = "";
      document.getElementById("nombre").value = "";
      document.getElementById("poidsNourriture").value = "";
      document.getElementById("exercice").value = "";
      document.getElementById("notes").value = "";
    };

    window.uploadDocument = async function() {
      const file = document.getElementById("fichierDocument").files[0];

      if (!file) {
        alert("Choisis un fichier");
        return;
      }

      try {
        setStatus("Upload document...");
        const url = await uploadFile("documents/" + Date.now() + "_" + file.name, file);

        documents.push({
          nom: file.name,
          lien: url
        });

        await sauver();
        afficherDocuments();

        document.getElementById("fichierDocument").value = "";
        setStatus("Synchronisé ✅");
      } catch (e) {
        console.error(e);
        setStatus("Erreur ❌");
        alert("Erreur upload document : " + e.message);
      }
    };

    charger();
  </script>
</body>
</html>
