<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Fiche Rapaces</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <style>
    :root{
      --bg:#111;
      --panel:#1b1b1b;
      --line:#333;
      --text:#fff;
      --muted:#bdbdbd;
      --accent:#7ca56b;
      --accent2:#ddd;
      --danger:#b44545;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .app{
      max-width:1200px;
      margin:0 auto;
      padding:24px;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }
    .topbar h1{
      margin:0 0 6px 0;
      font-size:38px;
    }
    #status{
      color:var(--muted);
      font-size:14px;
      margin-top:4px;
    }
    .nav{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin:20px 0 26px;
    }
    .nav button,.btn{
      border:none;
      border-radius:10px;
      padding:10px 16px;
      cursor:pointer;
      background:var(--accent2);
      color:#222;
      font-weight:600;
    }
    .nav button.active{
      background:var(--accent);
      color:#fff;
    }
    .btn-danger{
      background:var(--danger);
      color:#fff;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:14px;
    }
    .section{margin-top:8px}
    .hidden{display:none !important}
    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:14px;
      padding:18px;
      margin-bottom:18px;
    }
    input,select,textarea{
      width:100%;
      padding:12px;
      margin-top:6px;
      margin-bottom:12px;
      border-radius:10px;
      border:1px solid #555;
      background:#222;
      color:#fff;
    }
    textarea{min-height:110px;resize:vertical}
    label{
      display:block;
      margin-top:8px;
      margin-bottom:4px;
      font-weight:600;
    }
    .actions,.small-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .item{
      background:#181818;
      border:1px solid var(--line);
      border-radius:12px;
      padding:14px;
      margin-top:12px;
    }
    .item h3{margin:0 0 10px 0}
    .item p{margin:6px 0}
    .stats-number{
      font-size:34px;
      font-weight:700;
      margin:6px 0 0 0;
    }
    .bird-photo{
      max-width:220px;
      width:100%;
      border-radius:12px;
      margin:10px 0;
      display:block;
    }
    a{color:#8ecbff}
  </style>
</head>
<body>
  <div id="appContent" class="app">
    <header class="topbar">
      <div>
        <h1>Fiche Rapaces</h1>
        <div id="status">Chargement…</div>
      </div>
      <div class="actions">
        <button class="btn" onclick="saveData()">Sauvegarder</button>
      </div>
    </header>

    <nav class="nav">
      <button id="btn-accueil" class="active" onclick="showSection('accueil')">Accueil</button>
      <button id="btn-oiseaux" onclick="showSection('oiseaux')">Oiseaux</button>
      <button id="btn-encodage" onclick="showSection('encodage')">Encodage</button>
      <button id="btn-documents" onclick="showSection('documents')">Documents</button>
      <button id="btn-nourrissage" onclick="showSection('nourrissage')">Nourrissage</button>
      <button id="btn-stock" onclick="showSection('stock')">Stock</button>
    </nav>

    <section id="section-accueil" class="section">
      <div class="grid">
        <div class="card">
          <h3>Oiseaux</h3>
          <p id="statOiseaux" class="stats-number">0</p>
        </div>
        <div class="card">
          <h3>Encodages</h3>
          <p id="statEncodages" class="stats-number">0</p>
        </div>
        <div class="card">
          <h3>Documents</h3>
          <p id="statDocuments" class="stats-number">0</p>
        </div>
        <div class="card">
          <h3>Nourrissages</h3>
          <p id="statNourrissages" class="stats-number">0</p>
        </div>
      </div>
    </section>

    <section id="section-oiseaux" class="section hidden">
      <div class="card">
        <h2>Ajouter un oiseau</h2>

        <label for="oiseauNom">Nom</label>
        <input id="oiseauNom" placeholder="Nom">

        <label for="oiseauEspece">Espèce</label>
        <input id="oiseauEspece" placeholder="Espèce">

        <label for="oiseauSexe">Sexe</label>
        <input id="oiseauSexe" placeholder="Sexe">

        <label for="oiseauAge">Âge</label>
        <input id="oiseauAge" placeholder="Âge">

        <label for="oiseauPoids">Poids</label>
        <input id="oiseauPoids" placeholder="Poids (g)">

        <label for="oiseauNotes">Notes</label>
        <textarea id="oiseauNotes" placeholder="Notes"></textarea>

        <div class="actions">
          <button class="btn" onclick="ajouterOiseau()">Ajouter l’oiseau</button>
        </div>
      </div>

      <div class="card">
        <h2>Liste des oiseaux</h2>
        <div id="listeOiseaux"></div>
      </div>
    </section>

    <section id="section-encodage" class="section hidden">
      <div class="card">
        <h2>Nouvel encodage</h2>

        <label for="encDate">Date</label>
        <input id="encDate" type="date">

        <label for="encNom">Oiseau</label>
        <select id="encNom"></select>

        <label for="encEspece">Espèce</label>
        <input id="encEspece" placeholder="Espèce">

        <label for="encPoids">Poids</label>
        <input id="encPoids" placeholder="Poids">

        <label for="encNourriture">Nourriture</label>
        <input id="encNourriture" placeholder="Nourriture">

        <label for="encEtat">État</label>
        <input id="encEtat" placeholder="État">

        <label for="encLieu">Lieu</label>
        <input id="encLieu" placeholder="Lieu">

        <label for="encObs">Observations</label>
        <textarea id="encObs" placeholder="Observations"></textarea>

        <div class="actions">
          <button class="btn" onclick="ajouterEncodage()">Ajouter encodage</button>
        </div>
      </div>

      <div class="card">
        <h2>Liste des encodages</h2>
        <div id="listeEncodages"></div>
      </div>
    </section>

    <section id="section-documents" class="section hidden">
      <div class="card">
        <h2>Documents</h2>

        <label for="docTitre">Titre</label>
        <input id="docTitre" placeholder="Titre">

        <label for="docType">Type</label>
        <input id="docType" placeholder="Type">

        <label for="docDescription">Description</label>
        <textarea id="docDescription" placeholder="Description"></textarea>

        <div class="actions">
          <button class="btn" onclick="ajouterDocument()">Ajouter document</button>
        </div>
      </div>

      <div class="card">
        <h2>Liste des documents</h2>
        <div id="listeDocuments"></div>
      </div>
    </section>

    <section id="section-nourrissage" class="section hidden">
      <div class="card">
        <h2>Nourrissage</h2>

        <label for="feedDate">Date</label>
        <input id="feedDate" type="date">

        <label for="feedBird">Oiseau</label>
        <select id="feedBird"></select>

        <label for="feedFood">Nourriture</label>
        <input id="feedFood" placeholder="Nourriture">

        <label for="feedQty">Quantité</label>
        <input id="feedQty" placeholder="Quantité">

        <label for="feedNote">Remarques</label>
        <textarea id="feedNote" placeholder="Remarques"></textarea>

        <div class="actions">
          <button class="btn" onclick="ajouterNourrissage()">Ajouter nourrissage</button>
        </div>
      </div>

      <div class="card">
        <h2>Liste des nourrissages</h2>
        <div id="listeNourrissage"></div>
      </div>
    </section>

    <section id="section-stock" class="section hidden">
      <div class="card">
        <h2>Stock nourriture</h2>

        <label for="stockPoussin">Poussin</label>
        <input id="stockPoussin" type="number" placeholder="Poussin">

        <label for="stockCaille">Caille</label>
        <input id="stockCaille" type="number" placeholder="Caille">

        <label for="stockPigeon">Pigeon</label>
        <input id="stockPigeon" type="number" placeholder="Pigeon">

        <label for="stockLapin">Lapin</label>
        <input id="stockLapin" type="number" placeholder="Lapin">

        <label for="stockPoisson">Poisson</label>
        <input id="stockPoisson" type="number" placeholder="Poisson">

        <label for="stockSouris">Souris</label>
        <input id="stockSouris" type="number" placeholder="Souris">

        <div class="actions">
          <button class="btn" onclick="enregistrerStock()">Enregistrer stock</button>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="app.js?v=100"></script>
</body>
</html>
