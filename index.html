<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Fiche Rapaces</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f4ead7">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icon.png">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">

  <style>
    :root{
      --bg:#f7f1e3;
      --bg2:#efe6d1;
      --panel:#fffaf0;
      --line:rgba(96, 76, 46, 0.12);
      --text:#3d3123;
      --muted:#7b6b57;
      --accent:#8aa36b;
      --accent2:#e7dcc6;
      --danger:#b75b52;
      --card-shadow:0 12px 30px rgba(75,57,30,0.08);
      --radius:18px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(138,163,107,0.18), transparent 18%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      color:var(--text);
    }

    .app{
      max-width:1360px;
      margin:0 auto;
      padding:20px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:18px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    .page-title{
      margin:0;
      font-size:38px;
      letter-spacing:-0.03em;
    }

    .page-subtitle{
      margin:8px 0 0 0;
      color:var(--muted);
      font-size:15px;
    }

    #status{
      color:var(--muted);
      font-size:14px;
      margin-top:6px;
    }

    .sync-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      margin-top:10px;
      padding:8px 12px;
      border-radius:999px;
      font-size:13px;
      font-weight:700;
      border:1px solid transparent;
      width:max-content;
    }

    .sync-badge::before{
      content:"";
      width:10px;
      height:10px;
      border-radius:50%;
      display:inline-block;
      background:currentColor;
    }

    .sync-online{
      background:#eef7e8;
      color:#52703d;
      border-color:rgba(82,112,61,0.18);
    }

    .sync-saving{
      background:#fff3d8;
      color:#9b6a00;
      border-color:rgba(155,106,0,0.18);
    }

    .sync-saved{
      background:#e8f3ea;
      color:#35624a;
      border-color:rgba(53,98,74,0.18);
    }

    .sync-error{
      background:#fdeaea;
      color:#a13d3d;
      border-color:rgba(161,61,61,0.18);
    }

    .nav{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin:18px 0 24px;
    }

    .nav button,.btn{
      border:none;
      border-radius:12px;
      padding:12px 16px;
      cursor:pointer;
      background:var(--accent2);
      color:var(--text);
      font-weight:700;
      transition:.2s ease;
    }

    .nav button.active{
      background:var(--accent);
      color:#fff;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:16px;
    }

    .section{margin-top:8px}
    .hidden{display:none !important}

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,0.7), rgba(255,248,235,0.88));
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:18px;
      margin-bottom:18px;
      box-shadow:var(--card-shadow);
      backdrop-filter:blur(4px);
    }

    .card h2{margin-top:0;font-size:24px}
    .card h3{margin-top:0}

    input,select,textarea{
      width:100%;
      padding:12px 14px;
      margin-top:6px;
      margin-bottom:12px;
      border-radius:12px;
      border:1px solid rgba(96,76,46,0.14);
      background:#fffdf8;
      color:var(--text);
      outline:none;
    }

    textarea{min-height:110px;resize:vertical}

    label{
      display:block;
      margin-top:8px;
      margin-bottom:4px;
      font-weight:700;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .item{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:14px;
      padding:16px;
      margin-top:12px;
    }

    .item p{margin:6px 0}

    .stats-number{
      font-size:36px;
      font-weight:800;
      margin:6px 0 0 0;
    }

    .stat-label{
      color:var(--muted);
      margin:0;
    }

    @media (max-width: 700px){
      .nav button,.btn{width:100%}
      .page-title{font-size:28px}
      .app{padding:12px}
      .card{padding:14px}
      .grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div id="appContent" class="app">
    <header class="topbar">
      <div>
        <h1 class="page-title">Fiche Rapaces</h1>
        <p class="page-subtitle">Version stable Firebase + GitHub Pages</p>
        <div id="status">Chargement…</div>
        <div id="syncBadge" class="sync-badge sync-saving">Lecture…</div>
      </div>
      <div class="actions">
        <button class="btn" onclick="saveData()">Sauvegarder</button>
      </div>
    </header>

    <nav class="nav">
      <button id="btn-accueil" class="active" onclick="showSection('accueil')">Accueil</button>
      <button id="btn-oiseaux" onclick="showSection('oiseaux')">Oiseaux</button>
      <button id="btn-stock" onclick="showSection('stock')">Stock</button>
    </nav>

    <section id="section-accueil" class="section">
      <div class="grid">
        <div class="card">
          <h3>Oiseaux</h3>
          <p id="statOiseaux" class="stats-number">0</p>
          <p class="stat-label">Nombre total</p>
        </div>
        <div class="card">
          <h3>Stock</h3>
          <p id="statStock" class="stats-number">0</p>
          <p class="stat-label">Articles suivis</p>
        </div>
      </div>
    </section>

    <section id="section-oiseaux" class="section hidden">
      <div class="card">
        <h2>Ajouter un oiseau</h2>

        <label for="birdName">Nom</label>
        <input id="birdName" type="text" placeholder="Ex : Buse Harris">

        <label for="birdSpecies">Espèce</label>
        <input id="birdSpecies" type="text" placeholder="Ex : Parabuteo unicinctus">

        <label for="birdWeight">Poids (g)</label>
        <input id="birdWeight" type="number" placeholder="Ex : 850">

        <div class="actions">
          <button class="btn" onclick="addBird()">Ajouter</button>
        </div>
      </div>

      <div class="card">
        <h2>Liste des oiseaux</h2>
        <div id="listeOiseaux"></div>
      </div>
    </section>

    <section id="section-stock" class="section hidden">
      <div class="card">
        <h2>Stock nourriture</h2>

        <label for="stockPoussin">Poussins</label>
        <input id="stockPoussin" type="number" min="0">

        <label for="stockCaille">Cailles</label>
        <input id="stockCaille" type="number" min="0">

        <label for="stockPigeon">Pigeons</label>
        <input id="stockPigeon" type="number" min="0">

        <label for="stockLapin">Lapins</label>
        <input id="stockLapin" type="number" min="0">

        <div class="actions">
          <button class="btn" onclick="enregistrerStock()">Enregistrer stock</button>
        </div>
      </div>

      <div class="card">
        <h2>Valeurs actuelles</h2>
        <div id="stockResume"></div>
      </div>
    </section>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
