<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiche Rapaces</title>

<style>
body{font-family:Arial;margin:0;background:#f4ead7}
.hidden{display:none}

/* PIN */
.pin-overlay{
  position:fixed;inset:0;background:#f4ead7;
  display:flex;align-items:center;justify-content:center;z-index:9999;
}
.pin-card{
  background:white;padding:25px;border-radius:15px;
  width:300px;text-align:center;
}
.pin-error{color:red;height:20px}

/* UI simple */
.app{padding:20px}
button{padding:10px;margin:5px;border:none;border-radius:10px;background:#8aa36b;color:white}
input,select{padding:8px;margin:5px;width:100%}
.card{background:white;padding:15px;border-radius:10px;margin-bottom:10px}
</style>
</head>

<body>

<!-- PIN -->
<div id="pinOverlay" class="pin-overlay">
  <div class="pin-card">
    <h2>Accès sécurisé</h2>
    <input id="pinInput" type="password" maxlength="4" placeholder="PIN">
    <button onclick="checkPin()">Entrer</button>
    <div id="pinError" class="pin-error"></div>
  </div>
</div>

<div id="appContent" class="app hidden">

<h1>Fiche Rapaces</h1>

<button onclick="showSection('oiseaux')">Oiseaux</button>
<button onclick="showSection('nourrissage')">Nourrissage</button>
<button onclick="showSection('terrain')">Terrain</button>

<div id="section-oiseaux" class="card hidden">
  <h2>Ajouter oiseau</h2>
  <input id="oiseauNom" placeholder="Nom">
  <input id="oiseauEspece" placeholder="Espèce">
  <button onclick="ajouterOiseau()">Ajouter</button>
  <div id="listeOiseaux"></div>
</div>

<div id="section-nourrissage" class="card hidden">
  <h2>Nourrissage</h2>
  <input id="feedDate" type="date">
  <div id="listeNourrissage"></div>
</div>

<div id="section-terrain" class="card hidden">
  <h2>Mode terrain</h2>
  <div id="terrainZone"></div>
</div>

</div>

<script src="app.js"></script>
</body>
</html>
