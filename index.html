<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>FICHE RAPACES</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #f7f4ec;
  margin: 0;
  padding: 10px;
}

h1 { color:#6b4f12; }

.status {
  background:#eef6ff;
  border:1px solid #b9d6f2;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
  font-weight:bold;
}

.menu {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:10px;
}

button {
  padding:12px;
  border:none;
  border-radius:10px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

#btnMenuAccueil {background:#2d6aa1;}
#btnMenuOiseaux {background:#b88a1b;}
#btnMenuEncodage {background:#2f7d32;}
#btnMenuDocuments {background:#8a5a2b;}

.bloc {
  background:white;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

input {
  width:100%;
  padding:10px;
  margin:5px 0;
}

.hidden {display:none;}

.bird {
  padding:10px;
  border:1px solid #ccc;
  margin-top:5px;
  border-radius:8px;
  background:#fffdfa;
}
</style>
</head>

<body>

<h1>🦅 FICHE RAPACES</h1>
<div id="status" class="status">Connexion...</div>

<div class="menu">
<button onclick="show('accueil')">Accueil</button>
<button onclick="show('oiseaux')">Oiseaux</button>
<button onclick="show('encodage')">Encodage</button>
<button onclick="show('documents')">Documents</button>
</div>

<div id="accueil" class="bloc">
<h2>Accueil</h2>
Bienvenue dans ton application.
</div>

<div id="oiseaux" class="bloc hidden">
<h2>Oiseaux</h2>

<input id="nom" placeholder="Nom">
<input id="espece" placeholder="Espèce">

<button onclick="ajouter()">Ajouter</button>

<div id="liste"></div>
</div>

<div id="encodage" class="bloc hidden">
<h2>Encodage</h2>
</div>

<div id="documents" class="bloc hidden">
<h2>Documents</h2>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8VfPlBsxN0F8PexqFfOaU4_slFQU3qsA",
  authDomain: "fiche-rapaces.firebaseapp.com",
  projectId: "fiche-rapaces",
  storageBucket: "fiche-rapaces.firebasestorage.app",
  messagingSenderId: "881543403206",
  appId: "1:881543403206:web:17915a78ddbbde9a1929c7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const refDB = doc(db, "rapaces", "data");

let oiseaux = [];

function setStatus(txt){
  document.getElementById("status").innerText = txt;
}

window.show = function(section){
  document.getElementById("accueil").classList.add("hidden");
  document.getElementById("oiseaux").classList.add("hidden");
  document.getElementById("encodage").classList.add("hidden");
  document.getElementById("documents").classList.add("hidden");

  document.getElementById(section).classList.remove("hidden");
};

function afficher(){
  document.getElementById("liste").innerHTML =
    oiseaux.map(o => `
      <div class="bird">
        <b>${o.nom}</b><br>
        ${o.espece}
      </div>
    `).join("");
}

async function charger(){
  try{
    setStatus("Connexion...");
    const snap = await getDoc(refDB);

    if(snap.exists()){
      const data = snap.data();
      oiseaux = data.oiseaux || [];
    }

    afficher();
    setStatus("Synchronisé ✅");

  }catch(e){
    alert("Erreur Firebase : " + e.message);
  }
}

async function sauver(){
  await setDoc(refDB, { oiseaux });
}

window.ajouter = async function(){
  const nom = document.getElementById("nom").value.trim();
  const espece = document.getElementById("espece").value.trim();

  if(!nom){
    alert("Nom obligatoire");
    return;
  }

  oiseaux.push({nom, espece});

  await sauver();
  afficher();

  document.getElementById("nom").value="";
  document.getElementById("espece").value="";
};

charger();
</script>

</body>
</html>
