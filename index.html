    window.exportPDF = function(index) {
      const o = oiseaux[index];
      if (!o) return;

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF();

      let y = 15;
      const addLine = (txt) => {
        const lignes = pdf.splitTextToSize(String(txt), 185);
        pdf.text(lignes, 10, y);
        y += lignes.length * 7;
        if (y > 270) {
          pdf.addPage();
          y = 15;
        }
      };

      addLine("FICHE RAPACES V3");
      addLine("Nom : " + (o.nom || "-"));
      addLine("Espèce : " + (o.espece || "-"));
      addLine("Alerte basse : " + (o.alerteBasse || "-"));
      addLine("Alerte haute : " + (o.alerteHaute || "-"));
      addLine("Document : " + (o.documentNom || "-"));
      y += 4;
      addLine("Encodages :");

      const encodages = trierEncodages(Array.isArray(o.encodages) ? o.encodages : []);
      if (!encodages.length) {
        addLine("Aucun encodage");
      } else {
        encodages.forEach((e) => {
          addLine([
            e.date || "-",
            "Poids " + (e.poids || "-"),
            "Variation " + (e.variation || "0 g"),
            "Nourriture " + (e.nourriture || "-"),
            "Nombre " + (e.nombre || "-"),
            "Poids nourriture " + (e.poidsNourriture || "-"),
            "Exercice " + (e.exercice || "-"),
            "Notes " + (e.notes || "-")
          ].join(" | "));
        });
      }

      pdf.save(`fiche_${(o.nom || "oiseau").replace(/\s+/g, "_")}.pdf`);
    };

    window.exportExcel = function() {
      const lignes = [];
      lignes.push([
        "Nom",
        "Espèce",
        "Alerte basse",
        "Alerte haute",
        "Date encodage",
        "Poids",
        "Variation",
        "Nourriture",
        "Nombre",
        "Poids nourriture",
        "Exercice",
        "Notes"
      ]);

      oiseaux.forEach((o) => {
        const encodages = trierEncodages(Array.isArray(o.encodages) ? o.encodages : []);
        if (!encodages.length) {
          lignes.push([
            o.nom || "",
            o.espece || "",
            o.alerteBasse || "",
            o.alerteHaute || "",
            "",
            "",
            "",
            "",
            "",
            "",
            "",
            ""
          ]);
        } else {
          encodages.forEach((e) => {
            lignes.push([
              o.nom || "",
              o.espece || "",
              o.alerteBasse || "",
              o.alerteHaute || "",
              e.date || "",
              e.poids || "",
              e.variation || "",
              e.nourriture || "",
              e.nombre || "",
              e.poidsNourriture || "",
              e.exercice || "",
              e.notes || ""
            ]);
          });
        }
      });

      const csv = lignes
        .map((ligne) => ligne.map((v) => `"${String(v).replace(/"/g, '""')}"`).join(";"))
        .join("\n");

      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "rapaces_export.csv";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    };
