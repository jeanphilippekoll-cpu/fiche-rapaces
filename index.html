    function getAlertePoids(oiseau) {
      const encodages = trierEncodages(Array.isArray(oiseau.encodages) ? oiseau.encodages : []);
      if (!encodages.length) return null;

      const dernier = encodages[encodages.length - 1];
      const poids = parseFloat(dernier.poids);
      const basse = parseFloat(oiseau.alerteBasse);
      const haute = parseFloat(oiseau.alerteHaute);

      if (isNaN(poids)) return null;

      if (!isNaN(basse) && poids < basse) {
        return {
          type: "low",
          text: `Alerte : poids bas (${poids} g < ${basse} g)`
        };
      }

      if (!isNaN(haute) && poids > haute) {
        return {
          type: "high",
          text: `Alerte : poids haut (${poids} g > ${haute} g)`
        };
      }

      if (!isNaN(basse) || !isNaN(haute)) {
        return {
          type: "ok",
          text: `Poids dans la zone prévue`
        };
      }

      return null;
    }

    window.exportPDF = function(index) {
      const o = oiseaux[index];
      if (!o) return;

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF();

      let y = 15;
      const addLine = (txt) => {
        pdf.text(String(txt), 10, y);
        y += 8;
      };

      addLine("FICHE RAPACES V3");
      addLine("Nom : " + (o.nom || "-"));
      addLine("Espèce : " + (o.espece || "-"));
      addLine("Alerte basse : " + (o.alerteBasse || "-"));
      addLine("Alerte haute : " + (o.alerteHaute || "-"));
      addLine("Document : " + (o.documentNom || "-"));
      y += 4;
      addLine("Encodages :");

      const encodages = trierEncodages(Array.isArray(o.encodages) ? o.encodages : []);
      if (!encodages.length) {
        addLine("Aucun encodage");
      } else {
        encodages.forEach((e) => {
          const ligne = [
            e.date || "-",
            "Poids " + (e.poids || "-"),
            "Var " + (e.variation || "0 g"),
            e.nourriture || "-",
            e.notes || "-"
          ].join(" | ");

          const lignes = pdf.splitTextToSize(ligne, 185);
          pdf.text(lignes, 10, y);
          y += lignes.length * 7;

          if (y > 270) {
            pdf.addPage();
            y = 15;
          }
        });
      }

      pdf.save(`fiche_${(o.nom || "oiseau").replace(/\s+/g, "_")}.pdf`);
    };

    window.exportExcel = function() {
      const lignes = [];
      lignes.push([
        "Nom",
        "Espèce",
        "Alerte basse",
        "Alerte haute",
        "Date encodage",
        "Poids",
        "Variation",
        "Nourriture",
        "Nombre",
        "Poids nourriture",
        "Exercice",
        "Notes"
      ]);

      oiseaux.forEach((o) => {
        const encodages = trierEncodages(Array.isArray(o.encodages) ? o.encodages : []);
        if (!encodages.length) {
          lignes.push([
            o.nom || "",
            o.espece || "",
            o.alerteBasse || "",
            o.alerteHaute || "",
            "",
            "",
            "",
            "",
            "",
            "",
            "",
            ""
          ]);
        } else {
          encodages.forEach((e) => {
            lignes.push([
              o.nom || "",
              o.espece || "",
              o.alerteBasse || "",
              o.alerteHaute || "",
              e.date || "",
              e.poids || "",
              e.variation || "",
              e.nourriture || "",
              e.nombre || "",
              e.poidsNourriture || "",
              e.exercice || "",
              e.notes || ""
            ]);
          });
        }
      });

      const csv = lignes
        .map((ligne) => ligne.map((v) => `"${String(v).replace(/"/g, '""')}"`).join(";"))
        .join("\n");

      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "rapaces_export.csv";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    };
