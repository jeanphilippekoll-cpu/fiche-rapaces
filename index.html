<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Fiche Rapaces</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#111;
      color:#fff;
    }
    .hidden{display:none}
    .login-box{
      max-width:420px;
      margin:80px auto;
      text-align:center;
    }
    .login-box input{
      width:100%;
      padding:12px;
      margin:8px 0;
    }
    .login-box button{
      padding:12px 18px;
      margin:8px 6px;
      cursor:pointer;
    }
    .app{
      max-width:1200px;
      margin:0 auto;
      padding:20px;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      flex-wrap:wrap;
      margin-bottom:20px;
    }
    .nav{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin:20px 0;
    }
    .nav button{
      padding:10px 16px;
      cursor:pointer;
      border:none;
      border-radius:8px;
    }
    .nav button.active{
      background:#4caf50;
      color:#fff;
    }
    .card{
      background:#1c1c1c;
      border:1px solid #333;
      border-radius:12px;
      padding:16px;
      margin-bottom:18px;
    }
    input, select, textarea{
      width:100%;
      padding:10px;
      margin-top:6px;
      margin-bottom:12px;
      border-radius:8px;
      border:1px solid #444;
      background:#fff;
      color:#000;
    }
    .item{
      border:1px solid #333;
      border-radius:10px;
      padding:12px;
      margin-top:10px;
      background:#181818;
    }
    .danger{
      background:#b00020;
      color:#fff;
      border:none;
      padding:8px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-box">
  <h1>Connexion</h1>

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">

  <button id="btnLogin">Se connecter</button>
  <button id="btnRegister">Créer compte</button>

  <p id="status"></p>
</div>

<!-- APP -->
<div id="appScreen" class="app hidden">

  <div class="topbar">
    <div>
      <h1>Fiche Rapaces</h1>
      <div id="userInfo"></div>
    </div>

    <div>
      <button id="btnSave">Sauvegarder</button>
      <button id="btnLogout">Déconnexion</button>
    </div>
  </div>

  <!-- NAV -->
  <div class="nav">
    <button class="active" data-section="accueil">Accueil</button>
    <button data-section="oiseaux">Oiseaux</button>
    <button data-section="encodage">Encodage</button>
    <button data-section="documents">Documents</button>
    <button data-section="nourrissage">Nourrissage</button>
    <button data-section="stock">Stock</button>
  </div>

  <!-- ACCUEIL -->
  <section id="section-accueil" class="section">
    <div class="card">
      <p>Bienvenue dans ton application</p>
    </div>
  </section>

  <!-- OISEAUX -->
  <section id="section-oiseaux" class="section hidden">

    <div class="card">
      <h2>Ajouter un oiseau</h2>

      <input id="oiseauNom" placeholder="Nom">
      <input id="oiseauEspece" placeholder="Espèce">
      <input id="oiseauSexe" placeholder="Sexe">
      <input id="oiseauAge" placeholder="Âge">
      <input id="oiseauPoids" placeholder="Poids (g)">
      <input id="oiseauPhoto" type="file" accept="image/*">
      <textarea id="oiseauNotes" placeholder="Notes"></textarea>

      <button id="btnAddOiseau">Ajouter</button>
    </div>

    <div class="card">
      <div id="listeOiseaux"></div>
    </div>

  </section>

  <!-- ENCODAGE -->
  <section id="section-encodage" class="section hidden">

    <div class="card">
      <input id="encDate" type="date">
      <select id="encNom"></select>
      <input id="encEspece" placeholder="Espèce">
      <input id="encPoids" placeholder="Poids">
      <input id="encNourriture" placeholder="Nourriture">
      <input id="encEtat" placeholder="État">
      <input id="encLieu" placeholder="Lieu">
      <textarea id="encObs"></textarea>

      <button id="btnAddEncodage">Ajouter</button>
    </div>

    <div id="listeEncodages"></div>

  </section>

  <!-- DOCUMENTS -->
  <section id="section-documents" class="section hidden">

    <div class="card">
      <input id="docTitre" placeholder="Titre">
      <input id="docType" placeholder="Type">
      <textarea id="docDescription"></textarea>

      <button id="btnAddDocument">Ajouter</button>
    </div>

    <div id="listeDocuments"></div>

  </section>

  <!-- NOURRISSAGE -->
  <section id="section-nourrissage" class="section hidden">

    <div class="card">
      <input id="feedDate" type="date">
      <select id="feedBird"></select>
      <input id="feedFood">
      <input id="feedQty">
      <textarea id="feedNote"></textarea>

      <button id="btnAddFeed">Ajouter</button>
    </div>

    <div id="listeNourrissage"></div>

  </section>

  <!-- STOCK -->
  <section id="section-stock" class="section hidden">

    <div class="card">
      <input id="stockPoussin" type="number" placeholder="Poussin">
      <input id="stockCaille" type="number" placeholder="Caille">
      <input id="stockPigeon" type="number" placeholder="Pigeon">
      <input id="stockLapin" type="number" placeholder="Lapin">
      <input id="stockPoisson" type="number" placeholder="Poisson">
      <input id="stockSouris" type="number" placeholder="Souris">

      <button id="btnSaveStock">Sauver</button>
    </div>

  </section>

</div>

<script type="module" src="app.js?v=4"></script>

</body>
</html>
