<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>FICHE RAPACES V3</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
body{
  font-family:Arial;
  background:linear-gradient(180deg,#f7f4ec,#efe6d2);
  padding:10px;
}

.hidden{display:none}

.menu{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.menu button{
  padding:10px;
  color:white;
  border:none;
  border-radius:8px;
}

#btnMenuAccueil{background:#2d6aa1;}
#btnMenuOiseaux{background:#b88a1b;}
#btnMenuEncodage{background:#2f7d32;}
#btnMenuDocuments{background:#8a5a2b;}

.bloc{
  background:white;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

.enc{
  background:#eef7ef;
  border-left:5px solid #2f7d32;
  padding:10px;
  margin-top:5px;
}

.gain{color:green}
.perte{color:red}

.lock{
  position:fixed;
  inset:0;
  background:black;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}
</style>
</head>

<body>

<div id="lock" class="lock">
<h2>🔒 Code accès</h2>
<input id="pin">
<button onclick="unlock()">Entrer</button>
</div>

<h1>🦅 FICHE RAPACES</h1>
<div id="status">Connexion...</div>

<div class="menu">
<button onclick="show('accueil')">Accueil</button>
<button onclick="show('oiseaux')">Oiseaux</button>
<button onclick="show('encodage')">Encodage</button>
<button onclick="show('documents')">Documents</button>
</div>

<div id="accueil" class="bloc">Accueil</div>

<div id="oiseaux" class="bloc hidden">
<input id="nom" placeholder="Nom">
<input id="espece" placeholder="Espèce">
<input id="photo" type="file">
<input id="docOiseau" type="file">

<button onclick="addBird()">Ajouter</button>

<div id="liste"></div>
<div id="fiche"></div>
</div>

<div id="encodage" class="bloc hidden">
<select id="sel"></select>
<input id="date" type="date">
<input id="poids" placeholder="Poids">

<select id="nour">
<option>Poussin</option>
<option>Caille</option>
<option>Pigeon</option>
<option>Rat</option>
<option>Souris</option>
<option>Lapin</option>
<option>Cou poulet</option>
<option>Poisson</option>
<option>Coeur</option>
</select>

<input id="nb" placeholder="Nombre">

<button onclick="addEnc()">Ajouter</button>
</div>

<div id="documents" class="bloc hidden">
<button onclick="exportExcel()">Export Excel</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const APP_PIN="0212";

window.unlock=function(){
if(document.getElementById("pin").value===APP_PIN){
document.getElementById("lock").style.display="none";
}
}

const app=initializeApp({
apiKey:"AIzaSyD8VfPlBsxN0F8PexqFfOaU4_slFQU3qsA",
authDomain:"fiche-rapaces.firebaseapp.com",
projectId:"fiche-rapaces",
storageBucket:"fiche-rapaces.firebasestorage.app",
appId:"1:881543403206:web:17915a78ddbbde9a1929c7"
});

const db=getFirestore(app);
const storage=getStorage(app);
const refDB=doc(db,"rapaces","data");

let oiseaux=[];

function setStatus(t){document.getElementById("status").innerText=t;}

async function save(){
await setDoc(refDB,{oiseaux},{merge:true});
}

async function load(){
const s=await getDoc(refDB);
if(s.exists()) oiseaux=s.data().oiseaux||[];
render();
setStatus("OK");
}

function render(){
document.getElementById("liste").innerHTML=oiseaux.map((o,i)=>
`<div onclick="openBird(${i})">${o.nom}</div>`).join("");

document.getElementById("sel").innerHTML=oiseaux.map((o,i)=>
`<option value="${i}">${o.nom}</option>`).join("");
}

window.show=function(s){
["accueil","oiseaux","encodage","documents"].forEach(id=>document.getElementById(id).classList.add("hidden"));
document.getElementById(s).classList.remove("hidden");
}

async function upload(file,path){
const r=ref(storage,path);
await uploadBytes(r,file);
return await getDownloadURL(r);
}

window.addBird=async function(){
let nom=document.getElementById("nom").value;
let espece=document.getElementById("espece").value;
let photoF=document.getElementById("photo").files[0];
let docF=document.getElementById("docOiseau").files[0];

let photo="",doc="";

if(photoF) photo=await upload(photoF,"photo/"+Date.now());
if(docF) doc=await upload(docF,"doc/"+Date.now());

oiseaux.push({nom,espece,photo,doc,enc:[]});
await save();
render();
}

window.openBird=function(i){
let o=oiseaux[i];

document.getElementById("fiche").innerHTML=`
<h3>${o.nom}</h3>
<img src="${o.photo||""}" width="150">
${o.doc?`<a href="${o.doc}" target="_blank">Document</a>`:""}

<button onclick="exportPDF(${i})">PDF</button>

${o.enc.map((e,j)=>`
<div class="enc">
${e.date} ${e.poids}g
<span class="${e.var>0?'gain':'perte'}">${e.var}g</span>
<button onclick="delEnc(${i},${j})">X</button>
</div>`).join("")}
`;

draw(o.enc);
}

window.addEnc=async function(){
let i=document.getElementById("sel").value;
let p=parseFloat(document.getElementById("poids").value);

let arr=oiseaux[i].enc;
let prev=arr.length?arr[arr.length-1].poids:0;
let diff=p-prev;

arr.push({date:document.getElementById("date").value,poids:p,var:diff});

await save();
openBird(i);
}

window.delEnc=async function(i,j){
oiseaux[i].enc.splice(j,1);
await save();
openBird(i);
}

function draw(enc){
let c=document.getElementById("chart");
if(!c){
document.getElementById("fiche").innerHTML+=`<canvas id="chart"></canvas>`;
c=document.getElementById("chart");
}
new Chart(c,{type:"line",
data:{labels:enc.map(e=>e.date),datasets:[{data:enc.map(e=>e.poids)}]}
});
}

window.exportPDF=function(i){
const {jsPDF}=window.jspdf;
let pdf=new jsPDF();
pdf.text("Fiche "+oiseaux[i].nom,10,10);
pdf.save("fiche.pdf");
}

window.exportExcel=function(){
let txt="nom;date;poids\n";
oiseaux.forEach(o=>{
o.enc.forEach(e=>{
txt+=`${o.nom};${e.date};${e.poids}\n`;
});
});
let blob=new Blob([txt]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="export.csv";
a.click();
}

load();

</script>
</body>
</html>
