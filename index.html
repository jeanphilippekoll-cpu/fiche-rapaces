<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>FICHE RAPACES PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
background:linear-gradient(#f7f4ec,#efe6d2);
margin:0;
padding:10px;
}

.hidden{display:none}

.menu{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:10px;
}

.menu button{
padding:12px;
border:none;
border-radius:10px;
color:white;
font-weight:bold;
}

#btnMenuAccueil{background:#2d6aa1;}
#btnMenuOiseaux{background:#b88a1b;}
#btnMenuEncodage{background:#2f7d32;}
#btnMenuDocuments{background:#8a5a2b;}

.bloc{
background:white;
padding:12px;
border-radius:12px;
margin-bottom:10px;
}

input,select,textarea{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:1px solid #ccc;
}

.bird{
padding:10px;
border-radius:10px;
margin-top:6px;
background:#fffdfa;
cursor:pointer;
}

.enc{
background:#eef7ef;
border-left:5px solid #2f7d32;
padding:10px;
margin-top:8px;
}

.doc{
background:#f6efe7;
border-left:5px solid #8a5a2b;
padding:10px;
margin-top:8px;
}

.gain{color:green;font-weight:bold;}
.perte{color:red;font-weight:bold;}

.lock{
position:fixed;
inset:0;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}
</style>
</head>

<body>

<div id="lock" class="lock">
<h2>🔒 Code accès</h2>
<input id="pin">
<button onclick="unlock()">Entrer</button>
</div>

<h1>🦅 FICHE RAPACES</h1>
<div id="status">Connexion...</div>

<div class="menu">
<button onclick="show('accueil')">Accueil</button>
<button onclick="show('oiseaux')">Oiseaux</button>
<button onclick="show('encodage')">Encodage</button>
<button onclick="show('documents')">Documents</button>
</div>

<div id="accueil" class="bloc">Accueil</div>

<div id="oiseaux" class="bloc hidden">

<input id="nom" placeholder="Nom">
<input id="espece" placeholder="Espèce">
<input id="photo" type="file">
<input id="docOiseau" type="file">

<button onclick="addBird()">Ajouter</button>

<div id="liste"></div>
<div id="fiche"></div>

</div>

<div id="encodage" class="bloc hidden">

<select id="sel"></select>
<input id="date" type="date">
<input id="poids" placeholder="Poids">

<select id="nour">
<option>Poussin</option>
<option>Caille</option>
<option>Pigeon</option>
<option>Rat</option>
<option>Souris</option>
<option>Lapin</option>
<option>Cou poulet</option>
<option>Poisson</option>
<option>Coeur</option>
</select>

<input id="nb" placeholder="Nombre">

<button onclick="addEnc()">Ajouter</button>

</div>

<div id="documents" class="bloc hidden">

<input type="file" id="fileDoc">
<button onclick="addDoc()">Ajouter document</button>

<div id="docs"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const app=initializeApp({
apiKey:"AIza...",
authDomain:"fiche-rapaces.firebaseapp.com",
projectId:"fiche-rapaces",
storageBucket:"fiche-rapaces.firebasestorage.app",
appId:"1:881543403206:web:17915a78ddbbde9a1929c7"
});

const db=getFirestore(app);
const storage=getStorage(app);
const refDB=doc(db,"rapaces","data");

let oiseaux=[];
let documents=[];

function couleur(i){
const c=["#2d6aa1","#b88a1b","#2f7d32","#8a5a2b","#6a2da1","#a12d6a"];
return c[i%c.length];
}

window.unlock=function(){
if(document.getElementById("pin").value==="0212"){
document.getElementById("lock").style.display="none";
}
}

function setStatus(t){document.getElementById("status").innerText=t;}

window.show=function(s){
["accueil","oiseaux","encodage","documents"].forEach(id=>{
document.getElementById(id).classList.add("hidden");
});
document.getElementById(s).classList.remove("hidden");
}

async function upload(file,path){
const r=ref(storage,path);
await uploadBytes(r,file);
return await getDownloadURL(r);
}

window.addBird=async function(){
let nom=nomInput.value;
let espece=especeInput.value;
let photoF=photo.files[0];
let docF=docOiseau.files[0];

let photoURL="",docURL="";

if(photoF) photoURL=await upload(photoF,"photo/"+Date.now());
if(docF) docURL=await upload(docF,"doc/"+Date.now());

oiseaux.push({nom,espece,photo:photoURL,doc:docURL,enc:[]});

await save();
render();
}

window.openBird=function(i){
let o=oiseaux[i];

document.getElementById("fiche").innerHTML=`
<div style="border-top:5px solid ${couleur(i)}">
<h3>${o.nom}</h3>
<img src="${o.photo||""}" width="150">

${o.doc?`<a href="${o.doc}" target="_blank">Document</a>`:""}

<button onclick="delBird(${i})">Supprimer</button>

${o.enc.map((e,j)=>`
<div class="enc">
${e.date} ${e.poids}g 
<span class="${e.var>0?'gain':'perte'}">${e.var}g</span>
<button onclick="delEnc(${i},${j})">X</button>
</div>
`).join("")}
</div>
`;

draw(o.enc);
}

window.addEnc=async function(){
let i=sel.value;
let p=parseFloat(poids.value);

let arr=oiseaux[i].enc;
let prev=arr.length?arr[arr.length-1].poids:0;
let diff=p-prev;

arr.push({date:date.value,poids:p,var:diff});

await save();
openBird(i);
}

window.delEnc=async function(i,j){
oiseaux[i].enc.splice(j,1);
await save();
openBird(i);
}

window.delBird=async function(i){
if(!confirm("Supprimer ?"))return;
oiseaux.splice(i,1);
await save();
render();
}

function draw(enc){
let c=document.getElementById("chart");
if(!c){
document.getElementById("fiche").innerHTML+="<canvas id='chart'></canvas>";
c=document.getElementById("chart");
}
new Chart(c,{
type:"line",
data:{labels:enc.map(e=>e.date),datasets:[{data:enc.map(e=>e.poids)}]}
});
}

window.addDoc=async function(){
let f=fileDoc.files[0];
if(!f)return;

let url=await upload(f,"docs/"+Date.now());

documents.push({nom:f.name,lien:url});
await save();
renderDocs();
}

window.delDoc=async function(i){
documents.splice(i,1);
await save();
renderDocs();
}

function renderDocs(){
docs.innerHTML=documents.map((d,i)=>`
<div class="doc">
<a href="${d.lien}" target="_blank">${d.nom}</a>
<button onclick="delDoc(${i})">X</button>
</div>`).join("");
}

function render(){
liste.innerHTML=oiseaux.map((o,i)=>
`<div class="bird" onclick="openBird(${i})"
style="border-left:5px solid ${couleur(i)}">${o.nom}</div>`
).join("");

sel.innerHTML=oiseaux.map((o,i)=>
`<option value="${i}">${o.nom}</option>`
).join("");

renderDocs();
}

async function load(){
let s=await getDoc(refDB);
if(s.exists()){
oiseaux=s.data().oiseaux||[];
documents=s.data().documents||[];
}
render();
setStatus("Synchronisé");
}

async function save(){
await setDoc(refDB,{oiseaux,documents},{merge:true});
}

load();

</script>

</body>
</html>
