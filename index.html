<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>FICHE RAPACES</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#f7f4ec 0%,#efe6d2 100%);
  margin:0;
  padding:10px;
  color:#2f2a20;
}

h1{color:#6b4f12;}

.status{
  background:#eef6ff;
  border:1px solid #b9d6f2;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
  font-weight:bold;
}

.menu{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:10px;
}

.menu button{
  padding:12px;
  border:none;
  border-radius:10px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

#btnMenuAccueil{background:#2d6aa1;}
#btnMenuOiseaux{background:#b88a1b;}
#btnMenuEncodage{background:#2f7d32;}
#btnMenuDocuments{background:#8a5a2b;}

.bloc{
  background:white;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}

input,select,textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

.btn{
  background:#b88a1b;
  color:white;
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

.hidden{display:none;}

.bird{
  padding:10px;
  border:1px solid #d9c38b;
  border-radius:10px;
  margin-top:5px;
  background:#fffdfa;
  cursor:pointer;
}

.photo{
  max-width:200px;
  border-radius:10px;
  margin-top:10px;
}

.doc{
  background:#f6efe7;
  border-left:5px solid #8a5a2b;
  padding:8px;
  margin-top:5px;
}
</style>
</head>

<body>

<h1>🦅 FICHE RAPACES</h1>
<div id="status" class="status">Connexion...</div>

<div class="menu">
<button onclick="show('accueil')">Accueil</button>
<button onclick="show('oiseaux')">Oiseaux</button>
<button onclick="show('encodage')">Encodage</button>
<button onclick="show('documents')">Documents</button>
</div>

<div id="accueil" class="bloc">Accueil</div>

<!-- OISEAUX -->
<div id="oiseaux" class="bloc hidden">

<input id="nom" placeholder="Nom">
<input id="espece" placeholder="Espèce">

<div>Photo :</div>
<input type="file" id="photo">

<div>Documents :</div>
<input type="file" id="docsOiseau" multiple>

<button class="btn" onclick="ajouterOiseau()">Ajouter oiseau</button>

<h3>Recherche</h3>
<input id="recherche" oninput="afficherListe()">

<div id="liste"></div>

<h3>Fiche</h3>
<div id="fiche"></div>

</div>

<!-- ENCODAGE -->
<div id="encodage" class="bloc hidden">
<select id="selectOiseau"></select>
<input id="poids" placeholder="Poids">
<input id="notes" placeholder="Notes">
<button class="btn" onclick="ajouterEncodage()">Ajouter encodage</button>
</div>

<!-- DOCUMENTS -->
<div id="documents" class="bloc hidden">
<input type="file" id="fichierDoc">
<button class="btn" onclick="uploadDoc()">Ajouter document</button>
<div id="listeDocs"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const app = initializeApp({
apiKey:"AIzaSy...",
authDomain:"fiche-rapaces.firebaseapp.com",
projectId:"fiche-rapaces",
storageBucket:"fiche-rapaces.firebasestorage.app",
appId:"1:..."
});

const db=getFirestore(app);
const storage=getStorage(app);
const refDB=doc(db,"rapaces","data");

let oiseaux=[];
let documents=[];
let current=null;

function setStatus(t){document.getElementById("status").innerText=t;}

window.show=(s)=>{
["accueil","oiseaux","encodage","documents"].forEach(id=>document.getElementById(id).classList.add("hidden"));
document.getElementById(s).classList.remove("hidden");
}

async function charger(){
const snap=await getDoc(refDB);
if(snap.exists()){
const d=snap.data();
oiseaux=d.oiseaux||[];
documents=d.documents||[];
}
render();
}

async function sauver(){
await setDoc(refDB,{oiseaux,documents},{merge:true});
}

async function upload(file,path){
const r=ref(storage,path);
await uploadBytes(r,file);
return await getDownloadURL(r);
}

window.ajouterOiseau=async()=>{
const nom=document.getElementById("nom").value;
const espece=document.getElementById("espece").value;
const photoFile=document.getElementById("photo").files[0];
const docsFiles=document.getElementById("docsOiseau").files;

let photo="";
let docs=[];

if(photoFile) photo=await upload(photoFile,"photos/"+Date.now());

for(const f of docsFiles){
const url=await upload(f,"docs/"+Date.now()+f.name);
docs.push({nom:f.name,url});
}

oiseaux.push({nom,espece,photo,docs,enc:[]});
await sauver();
render();
}

function render(){
document.getElementById("liste").innerHTML=oiseaux.map((o,i)=>`
<div class="bird" onclick="openOiseau(${i})">
${o.nom}
</div>`).join("");

document.getElementById("selectOiseau").innerHTML=oiseaux.map((o,i)=>`
<option value="${i}">${o.nom}</option>`).join("");

document.getElementById("listeDocs").innerHTML=documents.map(d=>`
<div class="doc"><a href="${d.url}" target="_blank">${d.nom}</a></div>`).join("");
}

window.openOiseau=(i)=>{
current=i;
const o= oiseaux[i];

document.getElementById("fiche").innerHTML=`
<h3>${o.nom}</h3>
<div>${o.espece}</div>

${o.photo?`<img class="photo" src="${o.photo}">`:""}

<h4>Documents</h4>
${(o.docs||[]).map(d=>`<div class="doc"><a href="${d.url}" target="_blank">${d.nom}</a></div>`).join("")}

<h4>Encodage</h4>
${(o.enc||[]).map(e=>`<div>${e.poids} - ${e.notes}</div>`).join("")}
`;
}

window.ajouterEncodage=async()=>{
const i=document.getElementById("selectOiseau").value;
const poids=document.getElementById("poids").value;
const notes=document.getElementById("notes").value;

oiseaux[i].enc.push({poids,notes});
await sauver();
openOiseau(i);
}

window.uploadDoc=async()=>{
const f=document.getElementById("fichierDoc").files[0];
const url=await upload(f,"docs/"+Date.now());
documents.push({nom:f.name,url});
await sauver();
render();
}

charger();
</script>

</body>
</html>
