<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>FICHE RAPACES</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="FICHE RAPACES">
  <meta name="theme-color" content="#000000">

  <style>
    body {
      background: #000;
      color: #ffd700;
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
    }

    h1 {
      margin-top: 0;
      font-size: 40px;
    }

    input, button {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin: 6px 0;
      border-radius: 8px;
      border: 1px solid #555;
      font-size: 16px;
    }

    input {
      background: #f2f2f2;
      color: #000;
    }

    button {
      background: gold;
      color: #000;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .card {
      border: 1px solid gold;
      padding: 12px;
      margin-top: 12px;
      border-radius: 10px;
      background: #111;
    }
  </style>
</head>
<body>

<h1>🦅 FICHE RAPACES</h1>

<input id="nom" placeholder="Nom de l’oiseau">
<input id="poids" placeholder="Poids">
<input id="date" type="date">

<button onclick="ajouter()">Ajouter</button>

<div id="liste"></div>

<script>
let data = JSON.parse(localStorage.getItem("rapaces")) || [];

function afficher() {
  let html = "";

  data.forEach((o) => {
    html += `
      <div class="card">
        <b>${o.nom}</b><br>
        Poids : ${o.poids}<br>
        Date : ${o.date}
      </div>
    `;
  });

  document.getElementById("liste").innerHTML = html;
}

function ajouter() {
  const oiseau = {
    nom: document.getElementById("nom").value,
    poids: document.getElementById("poids").value,
    date: document.getElementById("date").value
  };

  data.push(oiseau);
  localStorage.setItem("rapaces", JSON.stringify(data));
  afficher();
}

afficher();
</script>

</body>
</html>
