<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>FICHE RAPACES</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; background:#f5f2e8; padding:20px; }
input, select, button { width:100%; padding:10px; margin:5px 0; }
button { background:#b88a1b; color:white; border:none; }
.card { background:white; padding:10px; margin-top:10px; border-radius:10px; }
</style>
</head>

<body>

<h1>🦅 FICHE RAPACES</h1>
<div id="status">Connexion...</div>

<h2>Ajouter un oiseau</h2>
<input id="nom" placeholder="Nom">
<input id="espece" placeholder="Espèce">
<button onclick="ajouter()">Ajouter</button>

<h2>Liste</h2>
<div id="liste"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const config = {
  apiKey: "AIzaSyD8VfPlBsxN0F8PexqFfOaU4_slFQU3qsA",
  authDomain: "fiche-rapaces.firebaseapp.com",
  projectId: "fiche-rapaces",
  storageBucket: "fiche-rapaces.firebasestorage.app",
  messagingSenderId: "881543403206",
  appId: "1:881543403206:web:17915a78ddbbde9a1929c7"
};

const app = initializeApp(config);
const db = getFirestore(app);
const ref = doc(db, "rapaces", "data");

let oiseaux = [];

function setStatus(t){ document.getElementById("status").innerText = t; }

async function charger(){
  try{
    const snap = await getDoc(ref);
    if(snap.exists()) oiseaux = snap.data().oiseaux || [];
    afficher();
    setStatus("OK ✅");
  }catch(e){
    alert("Erreur lecture: "+e.message);
  }
}

async function sauver(){
  try{
    await setDoc(ref, { oiseaux });
    setStatus("Sauvé ✅");
  }catch(e){
    alert("Erreur écriture: "+e.message);
  }
}

function afficher(){
  const div = document.getElementById("liste");
  div.innerHTML = "";

  oiseaux.forEach(o => {
    div.innerHTML += `<div class="card">${o.nom} - ${o.espece}</div>`;
  });
}

window.ajouter = async function(){
  const nom = document.getElementById("nom").value;
  const espece = document.getElementById("espece").value;

  if(!nom){ alert("Nom obligatoire"); return; }

  oiseaux.push({nom, espece});
  await sauver();
  afficher();
}

charger();
</script>

</body>
</html>
