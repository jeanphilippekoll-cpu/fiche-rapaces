<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>FICHE RAPACES</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  background:linear-gradient(180deg,#f7f4ec 0%,#efe6d2 100%);
  margin:0;
  padding:10px;
}

.status{
  background:#eef6ff;
  border:1px solid #b9d6f2;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
  font-weight:bold;
}

.menu{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:10px;
}

.menu button{
  padding:12px;
  border:none;
  border-radius:10px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

#btnMenuAccueil{background:#2d6aa1;}
#btnMenuOiseaux{background:#b88a1b;}
#btnMenuEncodage{background:#2f7d32;}
#btnMenuDocuments{background:#8a5a2b;}

.bloc{
  background:white;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

.hidden{display:none;}

.doc{
  background:#f6efe7;
  border-left:5px solid #8a5a2b;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
}
</style>
</head>

<body>

<h1>🦅 FICHE RAPACES</h1>
<div id="status" class="status">Connexion...</div>

<div class="menu">
<button onclick="show('accueil')">Accueil</button>
<button onclick="show('oiseaux')">Oiseaux</button>
<button onclick="show('encodage')">Encodage</button>
<button onclick="show('documents')">Documents</button>
</div>

<div id="accueil" class="bloc">
Accueil
</div>

<div id="oiseaux" class="bloc hidden">
Oiseaux OK
</div>

<div id="encodage" class="bloc hidden">
Encodage OK
</div>

<!-- ✅ DOCUMENTS -->
<div id="documents" class="bloc hidden">
<h2>Documents</h2>

<input type="file" id="fichierDocument">
<button onclick="uploadDocument()">Envoyer le document</button>

<div id="listeDocuments"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8VfPlBsxN0F8PexqFfOaU4_slFQU3qsA",
  authDomain: "fiche-rapaces.firebaseapp.com",
  projectId: "fiche-rapaces",
  storageBucket: "fiche-rapaces.firebasestorage.app",
  messagingSenderId: "881543403206",
  appId: "1:881543403206:web:17915a78ddbbde9a1929c7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);
const refDB = doc(db,"rapaces","data");

let documents = [];

function setStatus(t){
  document.getElementById("status").innerText = t;
}

window.show = function(s){
  ["accueil","oiseaux","encodage","documents"].forEach(id=>{
    document.getElementById(id).classList.add("hidden");
  });
  document.getElementById(s).classList.remove("hidden");
}

function afficherDocuments(){
  const div = document.getElementById("listeDocuments");

  if(!documents.length){
    div.innerHTML="Aucun document";
    return;
  }

  div.innerHTML = documents.map(d=>`
    <div class="doc">
      <a href="${d.lien}" target="_blank">${d.nom}</a>
    </div>
  `).join("");
}

async function charger(){
  const snap = await getDoc(refDB);

  if(snap.exists()){
    const data = snap.data();
    documents = data.documents || [];
  }

  afficherDocuments();
  setStatus("Synchronisé ✅");
}

async function sauver(){
  await setDoc(refDB,{documents},{merge:true});
}

window.uploadDocument = async function(){
  const file = document.getElementById("fichierDocument").files[0];

  if(!file){
    alert("Choisis un fichier");
    return;
  }

  setStatus("Upload...");

  const storageRef = ref(storage,"documents/"+Date.now()+"_"+file.name);

  await uploadBytes(storageRef,file);
  const url = await getDownloadURL(storageRef);

  documents.push({
    nom:file.name,
    lien:url
  });

  await sauver();
  afficherDocuments();

  document.getElementById("fichierDocument").value="";

  setStatus("Synchronisé ✅");
}

charger();
</script>

</body>
</html>
