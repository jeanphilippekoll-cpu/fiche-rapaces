<body>

<h1>🍽️ TABLEAU DE NOURRISSAGE</h1>

<div class="bloc">
  <div class="actions">
    <button class="btn btn-retour" onclick="history.back()">⬅ Retour</button>
    <button class="btn btn-secondaire" onclick="changerSemaine(-7)">⬅ Semaine</button>
    <button class="btn btn-secondaire" onclick="changerSemaine(7)">Semaine ➡</button>
    <button class="btn btn-export" onclick="window.print()">🖨 Imprimer</button>
  </div>
</div>

<div class="bloc">
  <h2>Dashboard</h2>
  <div id="dashboard" class="dashboard"></div>
</div>

<div class="bloc">
  <h2>Semaine</h2>
  <input type="date" id="dateSemaine" onchange="render()">
  <div class="table-wrap">
    <table id="tableau"></table>
  </div>
</div>

<script>
let oiseaux = JSON.parse(localStorage.getItem("rapaces_oiseaux")||"[]");
let planning = JSON.parse(localStorage.getItem("planning")||"{}");

const jours = ["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];

function getWeek(date){
  let d=new Date(date);
  let day=d.getDay();
  let diff=d.getDate()-day+(day===0?-6:1);
  let monday=new Date(d.setDate(diff));
  let res=[];
  for(let i=0;i<7;i++){
    let tmp=new Date(monday);
    tmp.setDate(monday.getDate()+i);
    res.push(tmp.toISOString().split("T")[0]);
  }
  return res;
}

function render(){
  let date=document.getElementById("dateSemaine").value;
  let week=getWeek(date||new Date());

  let html="<tr><th>Oiseau</th>";
  week.forEach((d,i)=>html+=`<th>${jours[i]}<br>${d}</th>`);
  html+="</tr>";

  oiseaux.forEach((o,i)=>{
    html+=`<tr><td>${o.nom}</td>`;
    week.forEach(d=>{
      let key=i+"_"+d;
      let val=planning[key]||"";
      html+=`<td>
        <input value="${val}" onchange="save(${i},'${d}',this.value)">
      </td>`;
    });
    html+="</tr>";
  });

  document.getElementById("tableau").innerHTML=html;

  document.getElementById("dashboard").innerHTML=`
    <div class="card"><h3>Oiseaux</h3>${oiseaux.length}</div>
    <div class="card"><h3>Cases</h3>${Object.keys(planning).length}</div>
  `;
}

function save(i,d,val){
  planning[i+"_"+d]=val;
  localStorage.setItem("planning",JSON.stringify(planning));
}

function changerSemaine(n){
  let d=new Date(document.getElementById("dateSemaine").value||new Date());
  d.setDate(d.getDate()+n);
  document.getElementById("dateSemaine").value=d.toISOString().split("T")[0];
  render();
}

document.getElementById("dateSemaine").value=new Date().toISOString().split("T")[0];
render();
</script>

</body>
</html>
